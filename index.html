<!--
Minimal HTML to provide container for the game and a place for the HUD.
-->
<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Zero-Point: The Wasp Protocol</title>
        <link rel="stylesheet" href="css/style.css">
    </head>
    <body>
        <div id="ui-layer">

            <div class="stat-container">
                <label>SYSTEM INTEGRITY</label>
                <div class="bar-bg"><div id="health-bar" style="width:100%"></div></div>
            </div>

            <div class="stat-container">
                <label>ZERO-POINT ENERGY</label>
                <div id="ammo-segments">
                    <div class="segment active"></div>
                    <div class="segment active"></div>
                    <div class="segment active"></div>
                    <div class="segment active"></div>
                    <div class="segment active"></div>
                </div>
            </div>

            <div id="crosshair">
                <div class="line vertical"></div>
                <div class="line horizontal"></div>
                <div class="dot"></div>
            </div>
        </div>
        <script type="module" src="js/main.js"></script>
    </body>
</html>
