<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Zero-Point: The Wasp Protocol</title>
        <link rel="stylesheet" href="css/style.css">
        <link rel="icon" type="image/png" href="assets/battle.png">
    </head>
    <body>

        <div id="start-screen" class="overlay">
            <h1>ZERO-POINT: THE WASP PROTOCOL</h1>
            <p>NEURAL LINK ESTABLISHED</p>
            <button id="start-button">INITIALIZE PILOT</button>
        </div>

        <div id="pause-screen" class="overlay" style="display: none;">
            <h1>SYSTEMS HALTED</h1>
            <p>PRESS 'P' TO RESUME</p>
            <button id="resume-button">RESUME</button>
        </div>

        <div id="game-over-screen" class="overlay" style="display: none;">
            <h1 style="color: #FF0000; text-shadow: 0 0 15px #FF0000;">PILOT KIA</h1>
            <p>NEURAL LINK SEVERED</p>
            <div id="final-score"></div>
            <button id="restart-button">RE-INITIALIZE</button>
        </div>

        <div id="ui-layer">
            <div class="stat-container">
                <label>SYSTEM INTEGRITY</label>
                <div class="bar-bg"><div id="health-bar" style="width:100%"></div></div>
            </div>

            <div class="stat-container">
                <label>ZERO-POINT ENERGY</label>
                <div id="ammo-segments">
                    <div class="segment active"></div>
                    <div class="segment active"></div>
                    <div class="segment active"></div>
                    <div class="segment active"></div>
                    <div class="segment active"></div>
                </div>
            </div>
            
            <div class="stat-container">
                <label>SYNC RATING</label>
                <div id="score-display" style="font-size: 24px; color: #00F2FF;">000000</div>
            </div>

            <p>FINAL SYNC: <span id="final-score-value">0</span></p>

            <div id="crosshair">
                <div class="line vertical"></div>
                <div class="line horizontal"></div>
                <div class="dot"></div>
            </div>

        </div>
        <div id="damage-haze" style="display: none;"></div>

        <script type="module" src="js/main.js"></script>
    </body>
</html>
